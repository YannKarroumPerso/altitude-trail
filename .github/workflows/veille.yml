name: Veille quotidienne

on:
  schedule:
    # Horaires Europe/Paris, couverts pour ete ET hiver.
    # Concurrence="veille" + cancel-in-progress=false → les doublons du meme
    # creneau sont queues et un seul tourne.
    # Cibles : 06:00, 11:30, 18:00 Paris.
    - cron: "0 4 * * *"   # 06:00 Paris CEST
    - cron: "0 5 * * *"   # 06:00 Paris CET
    - cron: "30 9 * * *"  # 11:30 Paris CEST
    - cron: "30 10 * * *" # 11:30 Paris CET
    - cron: "0 16 * * *"  # 18:00 Paris CEST
    - cron: "0 17 * * *"  # 18:00 Paris CET
  workflow_dispatch:
  push:
    paths:
      - ".github/triggers/veille.txt"

concurrency:
  group: veille
  cancel-in-progress: false

env:
  MAIL_TO: yannkarroum@gmail.com
  MAIL_FROM: "Altitude Trail Bot <yannkarroum@gmail.com>"
  GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
  SITE_BASE_URL: "https://www.altitude-trail.fr"

jobs:
  veille:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "altitude-veille-bot"
          git config user.email "altitude-veille-bot@users.noreply.github.com"

      - name: Compute timestamps
        id: time
        run: |
          echo "utc=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT
          echo "paris=$(TZ=Europe/Paris date '+%H:%M')" >> $GITHUB_OUTPUT
          echo "day=$(TZ=Europe/Paris date '+%A %d %B')" >> $GITHUB_OUTPUT

      - name: Preflight checks
        id: preflight
        run: |
          echo "=== Preflight ==="
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "FATAL: ANTHROPIC_API_KEY secret missing"
            exit 1
          fi
          MODEL="${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}"
          echo "Model to use: $MODEL"
          echo "model=$MODEL" >> $GITHUB_OUTPUT
          echo "Node: $(node --version)"
          echo "NPM:  $(npm --version)"
          echo "Last commit on main: $(git log -1 --format='%h %s')"
          echo "Site base URL: ${{ env.SITE_BASE_URL }}"

      - name: Notify start
        if: env.GMAIL_APP_PASSWORD != ''
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ env.MAIL_TO }}
          password: ${{ env.GMAIL_APP_PASSWORD }}
          subject: "Altitude Trail — veille démarrée (${{ steps.time.outputs.paris }} Paris)"
          to: ${{ env.MAIL_TO }}
          from: ${{ env.MAIL_FROM }}
          body: |
            La veille Altitude Trail vient de démarrer.

            Heure       : ${{ steps.time.outputs.paris }} Paris (${{ steps.time.outputs.utc }})
            Jour        : ${{ steps.time.outputs.day }}
            Déclencheur : ${{ github.event_name }}
            Modèle      : ${{ steps.preflight.outputs.model }}
            Run         : ${{ env.RUN_URL }}

            Tu recevras un second mail quand les articles seront en ligne
            sur ${{ env.SITE_BASE_URL }}.

      - name: Run veille
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ steps.preflight.outputs.model }}
          MAX_ARTICLES_PER_SOURCE: ${{ vars.MAX_ARTICLES_PER_SOURCE || '2' }}
          BFL_API_KEY: ${{ secrets.BFL_API_KEY }}
          FLUX_MODEL: ${{ vars.FLUX_MODEL || 'flux-pro-1.1' }}
          YOUTUBE_API_DATA: ${{ secrets.YOUTUBE_API_DATA }}
          SITE_BASE_URL: ${{ env.SITE_BASE_URL }}
        run: |
          set -e
          npm run veille

      - name: Publish and detect new articles
        id: publish
        run: |
          set -e
          BEFORE=$(git rev-parse HEAD)
          npm run publish
          AFTER=$(git rev-parse HEAD)
          if [ "$BEFORE" = "$AFTER" ]; then
            echo "Aucun nouvel article produit."
            echo "new_articles=0" >> $GITHUB_OUTPUT
            {
              echo "urls_text<<URLS_EOF"
              echo "(aucun nouvel article)"
              echo "URLS_EOF"
            } >> $GITHUB_OUTPUT
            echo "first_url=" >> $GITHUB_OUTPUT
            exit 0
          fi
          git diff --name-only --diff-filter=A "$BEFORE..$AFTER" -- 'content/articles/*.md' > /tmp/new-articles.txt
          COUNT=$(wc -l < /tmp/new-articles.txt | tr -d ' ')
          echo "new_articles=$COUNT" >> $GITHUB_OUTPUT
          sed 's|content/articles/||;s|\.md$||' /tmp/new-articles.txt > /tmp/slugs.txt
          : > /tmp/urls.txt
          while read -r slug; do
            echo "${{ env.SITE_BASE_URL }}/articles/$slug" >> /tmp/urls.txt
          done < /tmp/slugs.txt
          {
            echo "urls_text<<URLS_EOF"
            cat /tmp/urls.txt
            echo "URLS_EOF"
          } >> $GITHUB_OUTPUT
          FIRST_URL=$(head -1 /tmp/urls.txt)
          echo "first_url=$FIRST_URL" >> $GITHUB_OUTPUT
          echo "Articles publies : $COUNT"

      - name: Wait for Vercel deploy
        if: steps.publish.outputs.new_articles != '0' && steps.publish.outputs.first_url != ''
        id: deploy
        run: |
          URL="${{ steps.publish.outputs.first_url }}"
          echo "Polling $URL until 200 OK (max 10 min)..."
          for i in $(seq 1 30); do
            code=$(curl -s -L -o /dev/null -w "%{http_code}" --max-time 10 "$URL" 2>/dev/null || echo "000")
            echo "try $i/30: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "live=true" >> $GITHUB_OUTPUT
              echo "Deploy confirmed live."
              exit 0
            fi
            sleep 20
          done
          echo "Deploy not confirmed after 10 min"
          echo "live=false" >> $GITHUB_OUTPUT

      - name: Notify complete (articles en ligne)
        if: always() && env.GMAIL_APP_PASSWORD != '' && steps.publish.outputs.new_articles != '0'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ env.MAIL_TO }}
          password: ${{ env.GMAIL_APP_PASSWORD }}
          subject: "Altitude Trail — ${{ steps.publish.outputs.new_articles }} nouvel(s) article(s) en ligne"
          to: ${{ env.MAIL_TO }}
          from: ${{ env.MAIL_FROM }}
          body: |
            ${{ steps.publish.outputs.new_articles }} nouvel(s) article(s) publié(s) et déployé(s) sur ${{ env.SITE_BASE_URL }}.

            Déploiement confirmé en ligne : ${{ steps.deploy.outputs.live == 'true' && 'oui' || 'pas encore détecté (10 min écoulées)' }}

            URLs :

            ${{ steps.publish.outputs.urls_text }}

            Run : ${{ env.RUN_URL }}

      - name: Notify complete (aucun nouvel article)
        if: always() && env.GMAIL_APP_PASSWORD != '' && steps.publish.outputs.new_articles == '0'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ env.MAIL_TO }}
          password: ${{ env.GMAIL_APP_PASSWORD }}
          subject: "Altitude Trail — veille terminée, aucun nouvel article"
          to: ${{ env.MAIL_TO }}
          from: ${{ env.MAIL_FROM }}
          body: |
            La veille a tourné mais n'a rien produit de neuf : les RSS
            ingérés ne contenaient aucun article trail qui ne soit déjà
            publié sur ${{ env.SITE_BASE_URL }}.

            C'est normal entre deux cron rapprochés.

            Run : ${{ env.RUN_URL }}

      - name: Notify failure
        if: failure() && env.GMAIL_APP_PASSWORD != ''
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ env.MAIL_TO }}
          password: ${{ env.GMAIL_APP_PASSWORD }}
          subject: "Altitude Trail — ECHEC veille (voir logs)"
          to: ${{ env.MAIL_TO }}
          from: ${{ env.MAIL_FROM }}
          body: |
            Le run de veille a échoué.

            Heure  : ${{ steps.time.outputs.paris }} Paris
            Modèle : ${{ steps.preflight.outputs.model }}
            Run    : ${{ env.RUN_URL }}

            Consulte les logs pour identifier l'étape qui a planté.
